<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Projector body -->
  <rect x="20" y="45" width="88" height="50" rx="8" fill="#37474F"/>
  <rect x="24" y="49" width="80" height="42" rx="5" fill="#455A64"/>

  <!-- Lens -->
  <circle cx="95" cy="70" r="16" fill="#263238"/>
  <circle cx="95" cy="70" r="13" fill="#1E88E5"/>
  <circle cx="95" cy="70" r="9" fill="#42A5F5"/>
  <circle cx="95" cy="70" r="5" fill="#BBDEFB"/>
  <circle cx="92" cy="67" r="2" fill="#E3F2FD" opacity="0.8"/>

  <!-- Light beam -->
  <polygon points="111,58 128,20 128,120 111,82" fill="#42A5F5" opacity="0.25"/>
  <polygon points="111,62 124,30 124,110 111,78" fill="#64B5F6" opacity="0.2"/>

  <!-- Ventilation lines -->
  <line x1="30" y1="56" x2="65" y2="56" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="30" y1="61" x2="65" y2="61" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="30" y1="66" x2="65" y2="66" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="30" y1="71" x2="65" y2="71" stroke="#546E7A" stroke-width="1.5"/>

  <!-- Buttons -->
  <circle cx="40" cy="82" r="3" fill="#66BB6A"/>
  <circle cx="50" cy="82" r="3" fill="#EF5350"/>

  <!-- Stand/feet -->
  <rect x="32" y="95" width="12" height="6" rx="2" fill="#263238"/>
  <rect x="84" y="95" width="12" height="6" rx="2" fill="#263238"/>

  <!-- Keystone trapezoid indicator -->
  <polygon points="30,110 46,106 46,122 30,118" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <polygon points="56,106 72,110 72,118 56,122" fill="none" stroke="#42A5F5" stroke-width="2"/>

  <!-- Film reel on top -->
  <circle cx="45" cy="38" r="12" fill="#37474F"/>
  <circle cx="45" cy="38" r="9" fill="#455A64"/>
  <circle cx="45" cy="38" r="3" fill="#37474F"/>
  <circle cx="45" cy="32" r="1.5" fill="#37474F"/>
  <circle cx="45" cy="44" r="1.5" fill="#37474F"/>
  <circle cx="39" cy="38" r="1.5" fill="#37474F"/>
  <circle cx="51" cy="38" r="1.5" fill="#37474F"/>
</svg>
